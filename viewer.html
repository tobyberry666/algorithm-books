 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>阅读器</title>
   <link rel="stylesheet" href="css/viewer.css">
   <link rel="stylesheet" href="lib/highlight.min.css">
 </head>
 <body>
   <div id="toolbar">
     <button id="btn-back" title="返回书架">&larr; 书架</button>
     <span id="book-title">加载中...</span>
     <div class="toolbar-right">
       <button id="btn-toc" title="目录">&#9776;</button>
       <button id="btn-mode" title="切换阅读模式">&#9638; 翻页</button>
       <span id="page-indicator">- / -</span>
     </div>
   </div>
   <div id="main-area">
     <div id="sidebar">
       <div id="toc-container">加载目录...</div>
     </div>
     <div id="pdf-container">
       <div id="pdf-loading">加载中...</div>
     </div>
   </div>
   <div id="page-nav">
     <button id="btn-prev" title="上一页">&larr;</button>
     <span>页码 <input type="number" id="page-input" min="1" value="1"></span>
     <button id="btn-next" title="下一页">&rarr;</button>
   </div>
   <script src="lib/highlight.min.js"></script>
   <script src="lib/pdfjs/pdf.min.js"></script>
   <script type="module" src="js/viewer.js"></script>
 </body>
 </html>
