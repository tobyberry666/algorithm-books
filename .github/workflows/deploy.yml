name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify LFS files are real PDFs
        run: |
          for f in *.pdf; do
            if [ -f "$f" ]; then
              HEADER=$(head -c 5 "$f")
              if [ "$HEADER" != "%PDF-" ]; then
                echo "ERROR: $f is not a real PDF (header: $HEADER)"
                exit 1
              fi
              echo "OK: $f ($(du -h "$f" | cut -f1))"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
